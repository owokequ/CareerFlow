databaseChangeLog:
  - changeSet:
      id: 002-create-app-user
      author: owoke

      changes:
        - createTable:
            tableName: app_user

            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: authentication_id
                  type: varchar(36)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: app_user
            baseColumnNames: authentication_id

            referencedTableName: auth_user
            referencedColumnNames: id

            constraintName: fk_app_user_auth_user

        - createIndex:
            tableName: app_user
            indexName: idx_app_user_email
            columns:
              - column:
                  name: email

        - createIndex:
            tableName: app_user
            indexName: idx_app_user_auth_id
            columns:
              - column:
                  name: authentication_id
