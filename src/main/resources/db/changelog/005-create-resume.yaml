databaseChangeLog:
  - changeSet:
      id: 005-create-resume
      author: owoke

      changes:
        - createTable:
            tableName: resume

            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: varchar(36)
                  constraints:
                    nullable: false

              - column:
                  name: title
                  type: varchar(150)
                  constraints:
                    nullable: false

              - column:
                  name: target_position
                  type: varchar(150)
                  constraints:
                    nullable: false

              - column:
                  name: skills
                  type: varchar(1000)
                  constraints:
                    nullable: false

              - column:
                  name: summary
                  type: varchar(2000)

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: resume
            baseColumnNames: user_id

            referencedTableName: app_user
            referencedColumnNames: id

            constraintName: fk_resume_app_user

        - createIndex:
            tableName: resume
            indexName: idx_resume_user_id
            columns:
              - column:
                  name: user_id
